<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사다리 타기 게임</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1830;
    --accent1: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --accent4: #4d96ff;
    --accent5: #ff6b9d;
    --text: #fffffe;
    --muted: #a7a9be;
    --border: #2e2c4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 30%, rgba(77,150,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(255,107,107,0.06) 0%, transparent 60%);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 20px 40px;
  }

  /* ── 헤더 ── */
  .header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent1) 50%, #ff9f9f 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 18px rgba(255,217,61,0.4));
    white-space: nowrap;
  }

  .btn-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .btn {
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    padding: 9px 18px;
    border: 2px solid;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
    position: relative;
    overflow: hidden;
    white-space: nowrap;
  }
  .btn::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.2s; }
  .btn:hover::before { opacity: 1; }

  .btn-install { background: var(--surface); border-color: var(--accent2); color: var(--accent2); }
  .btn-install::before { background: rgba(255,217,61,0.12); }
  .btn-install:hover { box-shadow: 0 0 14px rgba(255,217,61,0.5); transform: translateY(-1px); }
  .btn-install:active { transform: translateY(0); }
  .btn-install:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-check { background: var(--surface); border-color: var(--accent4); color: var(--accent4); }
  .btn-check::before { background: rgba(77,150,255,0.12); }
  .btn-check:hover { box-shadow: 0 0 14px rgba(77,150,255,0.5); transform: translateY(-1px); }
  .btn-check:active { transform: translateY(0); }
  .btn-check:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-reset { background: var(--surface); border-color: var(--accent5); color: var(--accent5); }
  .btn-reset::before { background: rgba(255,107,157,0.12); }
  .btn-reset:hover { box-shadow: 0 0 14px rgba(255,107,157,0.5); transform: translateY(-1px); }
  .btn-reset:active { transform: translateY(0); }

  .status-msg {
    font-size: 0.82rem;
    color: var(--muted);
    margin-left: auto;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  /* ── 설정 줄 ── */
  .settings-row {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 16px;
    padding: 14px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    flex-wrap: wrap;
  }

  .setting-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .setting-label {
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .setting-label .val { color: var(--accent2); }
  .setting-label .val-win { color: var(--accent3); }

  .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }

  .chip {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 0.88rem; font-weight: 800;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; align-items: center; justify-content: center;
  }
  .chip:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(255,217,61,0.08); }
  .chip.active-p { border-color: var(--accent2); background: rgba(255,217,61,0.18); color: var(--accent2); box-shadow: 0 0 8px rgba(255,217,61,0.3); }
  .chip.active-w { border-color: var(--accent3); background: rgba(107,203,119,0.18); color: var(--accent3); box-shadow: 0 0 8px rgba(107,203,119,0.3); }
  .chip.chip-win:hover { border-color: var(--accent3); color: var(--accent3); background: rgba(107,203,119,0.08); }

  .divider { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }

  /* ── 게임 영역 ── */
  .game-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px 20px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .names-row {
    display: flex;
    justify-content: space-around;
    margin-bottom: 14px;
    padding: 0 8px;
    gap: 4px;
  }

  .name-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    flex: 1;
    min-width: 0;
  }

  .name-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    text-align: center;
    padding: 6px 2px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-width: 0;
  }
  .name-input:focus { border-color: var(--accent2); box-shadow: 0 0 8px rgba(255,217,61,0.25); }
  .name-input::placeholder { color: #444; font-size: 0.75rem; }

  #ladderCanvas { display: block; width: 100%; height: 320px; border-radius: 8px; }

  .gifts-row {
    display: flex;
    justify-content: space-around;
    margin-top: 12px;
    padding: 0 8px;
    gap: 4px;
  }

  .gift-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }

  .gift-box { width: 54px; height: 54px; position: relative; transition: transform 0.3s; }
  .gift-svg { width: 100%; height: 100%; }

  .gift-result {
    font-size: 0.75rem;
    font-weight: 800;
    text-align: center;
    opacity: 0;
    transform: translateY(4px);
    transition: all 0.4s;
    min-height: 22px;
    white-space: nowrap;
    border-radius: 6px;
    padding: 2px 6px;
  }
  .gift-result.show { opacity: 1; transform: translateY(0); }
  .gift-result.win {
    color: #0f0e17;
    font-size: 1rem;
    background: var(--accent2);
    box-shadow: 0 0 12px rgba(255,217,61,0.7), 0 0 24px rgba(255,217,61,0.3);
    animation: winPulse 1.2s ease-in-out infinite;
    padding: 3px 10px;
  }
  .gift-result.lose { color: var(--muted); font-size: 0.75rem; }

  @keyframes winPulse {
    0%, 100% { box-shadow: 0 0 10px rgba(255,217,61,0.6), 0 0 20px rgba(255,217,61,0.2); }
    50%       { box-shadow: 0 0 20px rgba(255,217,61,1.0), 0 0 40px rgba(255,217,61,0.6); }
  }

  .gift-box.boom { animation: boom 0.5s ease-out forwards; }
  @keyframes boom {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.4) rotate(-5deg); }
    60%  { transform: scale(0.8) rotate(5deg); }
    100% { transform: scale(0); opacity: 0; }
  }

  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
  .confetti-piece {
    position: absolute; width: 8px; height: 12px;
    border-radius: 2px; animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="stars"></div>

<div class="container">

  <!-- 헤더 -->
  <div class="header">
    <div class="title">🎰 사다리 타기 게임</div>
    <div class="btn-group">
      <button class="btn btn-install" id="btnInstall">사다리 설치</button>
      <button class="btn btn-check"   id="btnCheck"   disabled>사다리 확인</button>
      <button class="btn btn-reset"   id="btnReset">리셋</button>
    </div>
    <div class="status-msg" id="statusMsg">인원·당첨자 수를 설정하고 이름을 입력하세요</div>
  </div>

  <!-- 설정 줄 -->
  <div class="settings-row">
    <div class="setting-group">
      <div class="setting-label">인원 <span class="val" id="playerLabel">7</span>명</div>
      <div class="chip-group" id="playerChips"></div>
    </div>
    <div class="divider"></div>
    <div class="setting-group">
      <div class="setting-label">당첨자 <span class="val-win" id="winnerLabel">1</span>명</div>
      <div class="chip-group" id="winnerChips"></div>
    </div>
  </div>

  <!-- 게임 영역 -->
  <div class="game-wrap">
    <div class="names-row" id="namesRow"></div>
    <canvas id="ladderCanvas"></canvas>
    <div class="gifts-row" id="giftsRow"></div>
  </div>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<script>
const COLORS = [
  '#ff6b6b','#ffd93d','#6bcb77','#4d96ff',
  '#ff9f7f','#c77dff','#00c9a7','#ff6b9d',
  '#a3e635','#38bdf8'
];

let NUM = 7, WIN_COUNT = 1;
let horizontals = [], results = [];
let installed = false, checkIdx = 0;
let animating = false, paths = [], giftAssigned = false;
let inputs = [];

// ── 설정 칩 ──────────────────────────────────
function buildSettingChips() {
  const pc = document.getElementById('playerChips');
  const wc = document.getElementById('winnerChips');
  pc.innerHTML = ''; wc.innerHTML = '';

  for (let n = 2; n <= 10; n++) {
    const c = document.createElement('button');
    c.className = 'chip' + (n === NUM ? ' active-p' : '');
    c.textContent = n;
    c.onclick = () => {
      if (animating) return;
      NUM = n;
      if (WIN_COUNT >= NUM) WIN_COUNT = Math.max(1, NUM - 1);
      document.getElementById('playerLabel').textContent = NUM;
      document.getElementById('winnerLabel').textContent = WIN_COUNT;
      buildSettingChips();
      fullReset();
    };
    pc.appendChild(c);
  }

  const maxWin = Math.min(5, NUM - 1);
  for (let w = 1; w <= maxWin; w++) {
    const c = document.createElement('button');
    c.className = 'chip chip-win' + (w === WIN_COUNT ? ' active-w' : '');
    c.textContent = w;
    c.onclick = () => {
      if (animating) return;
      WIN_COUNT = w;
      document.getElementById('winnerLabel').textContent = WIN_COUNT;
      buildSettingChips();
      // 당첨자만 바꾸면 이름은 유지, 사다리만 초기화
      softReset();
    };
    wc.appendChild(c);
  }
}

// ── 게임 UI 재생성 ───────────────────────────
function buildGameUI() {
  const nr = document.getElementById('namesRow');
  const gr = document.getElementById('giftsRow');
  nr.innerHTML = ''; gr.innerHTML = ''; inputs = [];

  for (let i = 0; i < NUM; i++) {
    const nc = document.createElement('div'); nc.className = 'name-col';
    const inp = document.createElement('input');
    inp.className = 'name-input'; inp.maxLength = 5;
    inp.placeholder = `이름${i+1}`; inp.type = 'text';
    nc.appendChild(inp); nr.appendChild(nc); inputs.push(inp);

    const gc = document.createElement('div'); gc.className = 'gift-col';
    const gb = document.createElement('div');
    gb.className = 'gift-box'; gb.id = `gift${i}`; gb.innerHTML = giftSVG(i);
    const gres = document.createElement('div');
    gres.className = 'gift-result'; gres.id = `result${i}`;
    gc.appendChild(gb); gc.appendChild(gres); gr.appendChild(gc);
  }
}

function giftSVG(idx) {
  const bc = [
    ['#e63946','#c1121f'],['#f4a261','#e76f51'],['#2a9d8f','#21867a'],
    ['#457b9d','#1d3557'],['#9b5de5','#7b2d8b'],['#f15bb5','#c5155f'],
    ['#00bbf9','#0077b6'],['#e040fb','#9c27b0'],['#76c442','#4caf50'],['#29b6f6','#0288d1']
  ];
  const [c1,c2] = bc[idx % bc.length];
  return `<svg class="gift-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect x="6" y="28" width="52" height="30" rx="3" fill="${c1}"/>
    <rect x="4" y="22" width="56" height="10" rx="3" fill="${c2}"/>
    <rect x="28" y="22" width="8" height="36" fill="white" opacity=".85"/>
    <rect x="4" y="26" width="56" height="4" fill="white" opacity=".85"/>
    <ellipse cx="24" cy="20" rx="10" ry="7" fill="white" opacity=".9" transform="rotate(-20,24,20)"/>
    <ellipse cx="40" cy="20" rx="10" ry="7" fill="white" opacity=".9" transform="rotate(20,40,20)"/>
    <circle cx="32" cy="21" r="5" fill="${c2}"/>
  </svg>`;
}

// ── Canvas ───────────────────────────────────
const canvas = document.getElementById('ladderCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = canvas.parentElement.clientWidth - 40;
  canvas.height = 320;
  draw();
}
window.addEventListener('resize', resizeCanvas);

function getLayout() {
  const W = canvas.width, H = canvas.height;
  const margin = Math.max(28, Math.min(55, W / (NUM + 2)));
  const step   = (W - margin * 2) / Math.max(NUM - 1, 1);
  return { W, H, xOf: i => margin + i * step, yTop: 10, yBot: H - 10 };
}

function draw() {
  const { W, H, xOf, yTop, yBot } = getLayout();
  ctx.clearRect(0, 0, W, H);
  for (let i = 0; i < NUM; i++) {
    ctx.beginPath(); ctx.moveTo(xOf(i), yTop); ctx.lineTo(xOf(i), yBot);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2.5; ctx.stroke();
  }
  for (const h of horizontals) {
    ctx.beginPath(); ctx.moveTo(xOf(h.col), h.y); ctx.lineTo(xOf(h.col+1), h.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.stroke();
  }
  for (const p of paths) drawPath(p.segments, p.color, p.alpha);
}

function drawPath(segs, color, alpha) {
  if (!segs || segs.length < 2) return;
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 4;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.globalAlpha = alpha; ctx.shadowColor = color; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.moveTo(segs[0].x, segs[0].y);
  for (let i = 1; i < segs.length; i++) ctx.lineTo(segs[i].x, segs[i].y);
  ctx.stroke(); ctx.restore();
}

function generateHorizontals() {
  const { yTop, yBot } = getLayout();
  const newH = [], H_ZONES = 36, zoneH = (yBot - yTop) / H_ZONES, occ = {};
  for (let col = 0; col < NUM - 1; col++) {
    const target = Math.floor(Math.random() * 5) + 5;
    let placed = 0, tries = 0;
    while (placed < target && tries < 300) {
      tries++;
      const zone = Math.floor(Math.random() * H_ZONES);
      const cs = occ[zone] || new Set();
      if (!cs.has(col) && !cs.has(col-1) && !cs.has(col+1)) {
        if (!occ[zone]) occ[zone] = new Set();
        occ[zone].add(col);
        newH.push({ col, y: yTop + (zone + 0.5) * zoneH });
        placed++;
      }
    }
  }
  horizontals = newH;
}

function assignResults() {
  results = Array(NUM).fill('미당첨');
  const chosen = [];
  while (chosen.length < WIN_COUNT) {
    const r = Math.floor(Math.random() * NUM);
    if (!chosen.includes(r)) chosen.push(r);
  }
  chosen.forEach(i => { results[i] = '당첨'; });
}

function tracePath(startCol) {
  const { xOf, yTop, yBot } = getLayout();
  const segs = [], sorted = [...horizontals].sort((a,b) => a.y - b.y);
  let col = startCol, prevY = yTop;
  segs.push({ x: xOf(col), y: yTop });
  for (let g = 0; g < 500; g++) {
    const next = sorted.find(h => h.y > prevY + 0.1 && (h.col === col || h.col === col - 1));
    if (!next) { segs.push({ x: xOf(col), y: yBot }); break; }
    segs.push({ x: xOf(col), y: next.y });
    col = next.col === col ? col + 1 : col - 1;
    segs.push({ x: xOf(col), y: next.y });
    prevY = next.y;
  }
  return { segments: segs, endCol: col };
}

function animatePath(segs, color, onComplete) {
  const totalLen = segs.reduce((acc,s,i) => {
    if (i===0) return 0;
    const p = segs[i-1]; return acc + Math.hypot(s.x-p.x, s.y-p.y);
  }, 0);
  if (totalLen < 1) { paths.push({ segments:segs, color, alpha:0.7 }); draw(); onComplete(); return; }
  const speed = 280, duration = (totalLen/speed)*1000, startTime = performance.now();
  function step(now) {
    const progress = Math.min((now-startTime)/duration, 1);
    const targetLen = totalLen * progress;
    let accLen = 0; const drawn = [segs[0]];
    for (let i = 1; i < segs.length; i++) {
      const prev = segs[i-1], cur = segs[i];
      const segLen = Math.hypot(cur.x-prev.x, cur.y-prev.y);
      if (accLen + segLen >= targetLen) {
        const t = (targetLen-accLen)/segLen;
        drawn.push({ x: prev.x+(cur.x-prev.x)*t, y: prev.y+(cur.y-prev.y)*t }); break;
      }
      accLen += segLen; drawn.push(cur);
    }
    draw(); drawPath(drawn, color, 1);
    if (progress < 1) requestAnimationFrame(step);
    else { paths.push({ segments:segs, color, alpha:0.7 }); draw(); onComplete(); }
  }
  requestAnimationFrame(step);
}

// ── 리셋 (이름까지 초기화) ───────────────────
function fullReset() {
  if (animating) return;
  horizontals=[]; results=[]; installed=false; checkIdx=0;
  animating=false; paths=[]; giftAssigned=false;
  buildGameUI(); resizeCanvas();
  btnInstall.disabled = false; btnCheck.disabled = true;
  statusMsg.textContent = '인원·당첨자 수를 설정하고 이름을 입력하세요';
}

// ── 소프트 리셋 (이름 유지, 사다리만 초기화) ─
function softReset() {
  if (animating) return;
  const savedNames = inputs.map(inp => inp.value);
  horizontals=[]; results=[]; installed=false; checkIdx=0;
  animating=false; paths=[]; giftAssigned=false;
  buildGameUI(); resizeCanvas();
  savedNames.forEach((name, i) => { if (inputs[i]) inputs[i].value = name; });
  btnInstall.disabled = false; btnCheck.disabled = true;
  statusMsg.textContent = '인원·당첨자 수를 설정하고 이름을 입력하세요';
}

// ── 버튼 ─────────────────────────────────────
const btnInstall = document.getElementById('btnInstall');
const btnCheck   = document.getElementById('btnCheck');
const btnReset   = document.getElementById('btnReset');
const statusMsg  = document.getElementById('statusMsg');

btnInstall.addEventListener('click', () => {
  if (animating) return;
  generateHorizontals();
  if (!giftAssigned) { assignResults(); giftAssigned = true; }
  installed=true; checkIdx=0; paths=[];
  for (let i=0; i<NUM; i++) {
    const gb=document.getElementById(`gift${i}`), gr=document.getElementById(`result${i}`);
    gb.className='gift-box'; gb.innerHTML=giftSVG(i);
    gb.style.opacity='1'; gb.style.transform='';
    gr.className='gift-result'; gr.textContent='';
  }
  draw(); btnCheck.disabled=false;
  // 이름 입력칸 강조 초기화
  inputs.forEach(inp => {
    inp.style.color = '';
    inp.style.borderColor = '';
    inp.style.boxShadow = '';
    inp.style.fontSize = '';
    inp.style.fontWeight = '';
  });
  statusMsg.textContent=`사다리 설치 완료! 당첨자 ${WIN_COUNT}명 배정 — "사다리 확인"으로 경로를 확인하세요`;
});

btnCheck.addEventListener('click', () => {
  if (animating || !installed || checkIdx >= NUM) return;
  animating=true; btnCheck.disabled=true; btnInstall.disabled=true;
  const ci=checkIdx, color=COLORS[ci % COLORS.length];
  const { segments, endCol } = tracePath(ci);
  statusMsg.textContent=`${inputs[ci].value || `참가자${ci+1}`} 경로 확인 중...`;
  animatePath(segments, color, () => {
    const gb=document.getElementById(`gift${endCol}`), gr=document.getElementById(`result${endCol}`);
    const res=results[endCol];
    gb.classList.add('boom');
    setTimeout(() => {
      gb.style.opacity='0';
      // 당첨자는 이름 + 당첨 함께 표시, 미당첨은 텍스트만
      const name = inputs[endCol] ? (inputs[endCol].value || `참가자${endCol+1}`) : `참가자${endCol+1}`;
      if (res === '당첨') {
        gr.textContent = `🏆 당첨!`;
        gr.classList.add('show', 'win');
        // 이름 입력칸 강조
        if (inputs[endCol]) {
          inputs[endCol].style.color = '#ffd93d';
          inputs[endCol].style.borderColor = '#ffd93d';
          inputs[endCol].style.boxShadow = '0 0 10px rgba(255,217,61,0.6)';
          inputs[endCol].style.fontSize = '1rem';
          inputs[endCol].style.fontWeight = '900';
        }
        launchConfetti();
      } else {
        gr.textContent = '미당첨';
        gr.classList.add('show', 'lose');
      }
    }, 450);
    checkIdx++; animating=false;
    if (checkIdx < NUM) {
      btnCheck.disabled=false;
      statusMsg.textContent=`${inputs[ci].value || `참가자${ci+1}`} → ${res}! 다음 참가자를 확인하세요`;
    } else {
      btnInstall.disabled=false;
      statusMsg.textContent=`🎉 게임 종료! 당첨자 ${WIN_COUNT}명 선발 완료`;
      giftAssigned=false;
    }
  });
});

btnReset.addEventListener('click', () => {
  if (animating) return;
  fullReset();
});

function launchConfetti() {
  const wrap=document.getElementById('confettiWrap');
  const colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f7f','#fff'];
  for (let i=0; i<70; i++) {
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left=(10+Math.random()*80)+'%'; el.style.top='0';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.transform=`rotate(${Math.random()*360}deg)`;
    el.style.animationDuration=(1.5+Math.random()*1.5)+'s';
    el.style.animationDelay=(Math.random()*0.6)+'s';
    wrap.appendChild(el); setTimeout(()=>el.remove(), 3500);
  }
}

// ── 초기 실행 ────────────────────────────────
buildSettingChips();
buildGameUI();
resizeCanvas();
</script>
</body>
</html>
